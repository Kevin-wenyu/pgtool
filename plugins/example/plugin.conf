#!/bin/bash
# plugins/example/plugin.conf - 插件配置示例

# 插件基本信息
PLUGIN_NAME="example"
PLUGIN_VERSION="1.0.0"
PLUGIN_DESCRIPTION="示例插件 - 演示如何创建 pgtool 插件"
PLUGIN_AUTHOR="Your Name"
PLUGIN_URL="https://github.com/yourname/pgtool-plugin-example"

# 依赖检查
# 格式: "package>=version"
PLUGIN_DEPENDS="pgtool>=0.1.0,bash>=3.2,psql"

# 插件提供的命令
# 格式: "command:description"
PLUGIN_COMMANDS="hello:显示问候语,version:显示插件版本"

# 插件配置
PLUGIN_EXAMPLE_GREETING="${PLUGIN_EXAMPLE_GREETING:-Hello from Example Plugin!}"
