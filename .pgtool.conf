# pgtool.conf - pgtool 配置文件示例
# 复制此文件到以下位置之一：
#   1. ./.pgtool.conf (当前目录)
#   2. ~/.config/pgtool/pgtool.conf (用户配置)
#   3. ~/.pgtool.conf (用户主目录)
#   4. /etc/pgtool/pgtool.conf (系统配置)

#==============================================================================
# 数据库连接配置
#==============================================================================

# 数据库主机 (默认: localhost)
# PGTOOL_HOST=localhost

# 数据库端口 (默认: 5432)
# PGTOOL_PORT=5432

# 数据库用户 (默认: $USER)
# PGTOOL_USER=postgres

# 数据库名称 (默认: postgres)
# PGTOOL_DATABASE=postgres

# 密码 (建议使用 ~/.pgpass 文件，而不是在此配置)
# PGTOOL_PASSWORD=

#==============================================================================
# 行为配置
#==============================================================================

# 命令超时时间（秒）(默认: 30)
PGTOOL_TIMEOUT="${PGTOOL_TIMEOUT:-30}"

# 输出格式 (table|json|csv|tsv) (默认: table)
PGTOOL_FORMAT="${PGTOOL_FORMAT:-table}"

# 颜色输出 (auto|yes|no) (默认: auto)
PGTOOL_COLOR="${PGTOOL_COLOR:-auto}"

# 日志级别 (debug|info|warn|error|fatal) (默认: info)
PGTOOL_LOG_LEVEL="${PGTOOL_LOG_LEVEL:-info}"

#==============================================================================
# 检查阈值配置
#==============================================================================

# XID 检查 - 警告阈值 (默认: 1500000000)
PGTOOL_XID_WARNING=1500000000

# XID 检查 - 危险阈值 (默认: 2000000000)
PGTOOL_XID_CRITICAL=2000000000

# 连接数检查 - 警告阈值百分比 (默认: 80)
PGTOOL_CONN_THRESHOLD=80

#==============================================================================
# 插件配置
#==============================================================================

# 插件目录 (默认: ~/.pgtool/plugins)
# PGTOOL_PLUGINS_DIR="$HOME/.pgtool/plugins"

#==============================================================================
# 高级配置
#==============================================================================

# psql 额外选项
# PGTOOL_PSQL_OPTS="--echo-all"

# 是否显示调试信息 (默认: 0)
# PGTOOL_DEBUG=0
PGTOOL_LOG_LEVEL=debug
